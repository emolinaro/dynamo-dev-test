apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  namespace: dynamo-system
  name: vllm-agg-llava
spec:
  envs:
  # TCP is preferred for multimodal workloads because it overcomes:
  # - NATS default 1MB max payload limit (multimodal base64 images can exceed this)
  - name: DYN_REQUEST_PLANE
    value: "tcp"
  backendFramework: vllm
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        # optional: keep frontend off GPU node by omitting nodeSelector
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.0
    VLMWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          custom:
            ephemeral-storage: "2Gi"
      extraPodSpec:
        runtimeClassName: nvidia
        nodeSelector:
          ucloud.dk/gpu: "true"
        mainContainer:
          # Multimodal data (images) are decoded in the backend worker using ImageLoader
          # The vLLM backend no longer accepts --connector; aggregated serving uses
          # the default no-connector behavior automatically.
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.0
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --enable-multimodal
            - --model 
            - llava-hf/llava-1.5-7b-hf 
            - --gpu-memory-utilization 
            - "0.85" 
            - --max-model-len 
            - "2048"
