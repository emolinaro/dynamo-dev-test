apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  namespace: dynamo-system
  name: vllm-agg-qwen-vision
spec:
  envs:
  - name: UCX_TLS
    value: "tcp,cuda_copy,cuda_ipc"
  - name: UCX_LOG_LEVEL
    value: "info"
  - name: UCX_NET_DEVICES
    value: "eth0"
  - name: UCX_TCP_IF_EXCLUDE
    value: "lo,docker0,cni0"
  - name: UCX_SOCKADDR_TLS_PRIORITY
    value: "sockcm"
  - name: UCX_SOCKADDR_IFADDR
    value: "eth0"
  # Limit concurrency when downloading models from Hugging Face
#  - name: HF_HUB_ENABLE_HF_TRANSFER
#    value: "0"
#  - name: HF_HUB_DISABLE_PROGRESS_BARS
#    value: "1" 

  backendFramework: vllm

  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1

    # 1) Encode worker: generates multimodal embeddings
    EncodeWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          custom:
            ephemeral-storage: "2Gi"
      extraPodSpec:
        runtimeClassName: nvidia
        nodeSelector:
          ucloud.dk/gpu: "true"
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --multimodal-encode-worker
            - --enable-multimodal
            - --model
            - Qwen/Qwen2.5-VL-7B-Instruct
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "4096"

    # 2) Aggregated PD worker: frontend routes image requests here,
    # and the worker forwards embedding work to EncodeWorker.
    PDWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          custom:
            ephemeral-storage: "2Gi"
      extraPodSpec:
        runtimeClassName: nvidia
        nodeSelector:
          ucloud.dk/gpu: "true"
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --route-to-encoder
            - --enable-multimodal
            - --enable-mm-embeds
            - --model
            - Qwen/Qwen2.5-VL-7B-Instruct
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "4096"
