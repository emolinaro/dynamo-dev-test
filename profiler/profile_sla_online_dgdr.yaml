apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeploymentRequest
metadata:
  name: qwen-sla-online
  namespace: dynamo-system
spec:
  model: Qwen/Qwen3-0.6B
  backend: vllm
  image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
  searchStrategy: thorough
  autoApply: true
  workload:
    isl: 4000
    osl: 500
  sla:
    ttft: 600
    itl: 25
  hardware:
    gpuSku: h100_sxm
    numGpusPerNode: 4
  overrides:
    dgd:
      apiVersion: nvidia.com/v1alpha1
      kind: DynamoGraphDeployment
      metadata:
        name: qwen-sla-online
        namespace: dynamo-system
      spec:
        services:
          Frontend:
            envFromSecret: hf-token-secret
            componentType: frontend
            replicas: 1
            extraPodSpec:
              mainContainer:
                image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          VllmDecodeWorker:
            envFromSecret: hf-token-secret
            componentType: worker
            subComponentType: decode
            replicas: 1
            resources:
              limits:
                gpu: "1"
              requests:
                custom:
                  ephemeral-storage: "2Gi"
            extraPodSpec:
              runtimeClassName: nvidia
              nodeSelector:
                ucloud.dk/gpu: "true"
              mainContainer:
                image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
                workingDir: /workspace/examples/backends/vllm
                command:
                - python3
                - -m
                - dynamo.vllm
                args:
                  - --model
                  - Qwen/Qwen3-0.6B
                  - --is-decode-worker
          VllmPrefillWorker:
            envFromSecret: hf-token-secret
            componentType: worker
            subComponentType: prefill
            replicas: 1
            resources:
              limits:
                gpu: "1"
              requests:
                custom:
                  ephemeral-storage: "2Gi"
            extraPodSpec:
              runtimeClassName: nvidia
              nodeSelector:
                ucloud.dk/gpu: "true"
              mainContainer:
                image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
                workingDir: /workspace/examples/backends/vllm
                command:
                - python3
                - -m
                - dynamo.vllm
                args:
                  - --model
                  - Qwen/Qwen3-0.6B
                  - --is-prefill-worker
