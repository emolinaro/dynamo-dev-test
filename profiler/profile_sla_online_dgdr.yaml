apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeploymentRequest
metadata:
  name: qwen-sla-online
  namespace: dynamo-system
spec:
  model: Qwen/Qwen3-0.6B
  backend: vllm
  autoApply: true

  profilingConfig:
    profilerImage: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:0.8.1"
    configMapRef:
      name: qwen-config
      key: disagg.yaml  # Must match the key used in --from-file
    config:
      sla:
        isl: 4000
        osl: 500
        ttft: 600
        itl: 25
      hardware:
        numGpusPerNode: 4
        minNumGpusPerEngine: 1
        maxNumGpusPerEngine: 4
        gpuType: h100_sxm
      sweep:
        useAiConfigurator: false

  deploymentOverrides:
    workersImage: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:0.8.1"

