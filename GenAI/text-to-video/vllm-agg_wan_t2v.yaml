apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  namespace: dynamo-system
  name: vllm-agg-wan-t2v
spec:
  envs:
  # Video payloads are large. TCP avoids NATS payload limits.
  - name: DYN_REQUEST_PLANE
    value: "tcp"
  backendFramework: vllm
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
    OmniVideoWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          custom:
            ephemeral-storage: "10Gi"
      extraPodSpec:
        runtimeClassName: nvidia
        nodeSelector:
          ucloud.dk/gpu: "true"
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --omni
            - --output-modalities
            - video
            - --model
            - Wan-AI/Wan2.1-T2V-1.3B-Diffusers

