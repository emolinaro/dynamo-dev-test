        mainContainer:
          image: ${DYNAMO_VLLM_IMAGE}
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - ${MODEL_B}
            - --tensor-parallel-size
            - "1"
            - --disaggregation-mode
            - decode
            - --kv-transfer-config
            - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
          volumeMounts:
            - name: hf-model-cache
              mountPath: /home/dynamo/.cache/huggingface/hub
    Planner:
      componentType: planner
      replicas: 1
      extraPodSpec:
        volumes:
          - name: planner-profile-results
            emptyDir: {}
        initContainers:
          - name: planner-profile-results-init
            image: ${DYNAMO_IMAGE}
            command:
              - /bin/sh
              - -lc
            args:
              - |
                set -eu
                mkdir -p "${PROFILE_RESULTS_STAGING_ROOT}/${MODEL_B_PROFILE_RESULTS_ALIAS_NAME}"
                cp -R "${MODEL_B_PROFILE_RESULTS_SOURCE_DIR}/." "${PROFILE_RESULTS_STAGING_ROOT}/${MODEL_B_PROFILE_RESULTS_ALIAS_NAME}/"
            volumeMounts:
              - name: planner-profile-results
                mountPath: ${PROFILE_RESULTS_STAGING_ROOT}
        mainContainer:
          image: ${DYNAMO_IMAGE}
          volumeMounts:
            - name: planner-profile-results
              mountPath: ${PROFILE_RESULTS_STAGING_ROOT}
          command:
            - python3
            - -m
            - dynamo.planner
          args:
            - --config
            - '{"environment":"global-planner","global_planner_namespace":"${K8S_NAMESPACE}-gp-vllm-ctrl","backend":"vllm","mode":"decode","enable_load_scaling":false,"enable_throughput_scaling":true,"throughput_metrics_source":"router","itl":200,"max_gpu_budget":-1,"decode_engine_num_gpu":1,"model_name":"${MODEL_B}","profile_results_dir":"${MODEL_B_PROFILE_RESULTS_DIR}"}'
