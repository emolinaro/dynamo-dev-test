#
# vLLM-based GlobalPlanner example adapted from the upstream
# global-planner-vllm-test.yaml to serve 2 models behind a single frontend.
#
# Architecture:
# - DGD gp-vllm-ctrl: Frontend + GlobalRouterModelA + GlobalRouterModelB + GlobalPlanner
# - DGD gp-vllm-model-a-prefill-0: LocalRouter + VllmPrefillWorker (TP1) + Planner
# - DGD gp-vllm-model-a-prefill-1: LocalRouter + VllmPrefillWorker (TP2) + Planner
# - DGD gp-vllm-model-a-decode-0:  LocalRouter + VllmDecodeWorker  (TP1) + Planner
# - DGD gp-vllm-model-b-prefill-0: LocalRouter + VllmPrefillWorker (TP1) + Planner
# - DGD gp-vllm-model-b-prefill-1: LocalRouter + VllmPrefillWorker (TP2) + Planner
# - DGD gp-vllm-model-b-decode-0:  LocalRouter + VllmDecodeWorker  (TP1) + Planner
#
# Notes:
# - The single frontend intentionally omits --model-name so it can expose both
#   model registrations from the two GlobalRouter components in the same Dynamo
#   namespace.
# - This example follows the pool-based upstream test topology and does not set
#   fixed planner budgets. Use global-planner-shared-gpu-budget.yaml if you need
#   the budgeted variant.
# - Each planner pod stages the bundled profiling fixture into a dedicated
#   alias directory under ${PROFILE_RESULTS_STAGING_ROOT} before startup.
# - All vLLM workers mount the same RWX PVC for Hugging Face cache reuse.
#
# Render and apply with:
# envsubst < global-planner-single-frontend-two-models.yaml | kubectl apply -f -

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${K8S_NAMESPACE}-planner-vllm-two-models
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dynamo-platform-dynamo-operator-planner
subjects:
  - kind: ServiceAccount
    name: default
    namespace: ${K8S_NAMESPACE}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gp-vllm-model-a-router-config
  namespace: ${K8S_NAMESPACE}
data:
  global_router_config.json: |
    {
      "num_prefill_pools": 2,
      "num_decode_pools": 1,
      "prefill_pool_dynamo_namespaces": [
        "${K8S_NAMESPACE}-gp-vllm-model-a-prefill-0",
        "${K8S_NAMESPACE}-gp-vllm-model-a-prefill-1"
      ],
      "decode_pool_dynamo_namespaces": [
        "${K8S_NAMESPACE}-gp-vllm-model-a-decode-0"
      ],
      "prefill_pool_selection_strategy": {
        "ttft_min": 10, "ttft_max": 3000, "ttft_resolution": 2,
        "isl_min": 0,   "isl_max": 32000, "isl_resolution": 2,
        "prefill_pool_mapping": [[0,1],[0,1]]
      },
      "decode_pool_selection_strategy": {
        "itl_min": 10,  "itl_max": 500,   "itl_resolution": 2,
        "context_length_min": 0, "context_length_max": 32000, "context_length_resolution": 2,
        "decode_pool_mapping": [[0,0],[0,0]]
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gp-vllm-model-b-router-config
  namespace: ${K8S_NAMESPACE}
data:
  global_router_config.json: |
    {
      "num_prefill_pools": 2,
      "num_decode_pools": 1,
      "prefill_pool_dynamo_namespaces": [
        "${K8S_NAMESPACE}-gp-vllm-model-b-prefill-0",
        "${K8S_NAMESPACE}-gp-vllm-model-b-prefill-1"
      ],
      "decode_pool_dynamo_namespaces": [
