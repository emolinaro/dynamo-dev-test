#
# HTTPRoute for MODEL_A via GAIE. Set GAIE_HOST_MODEL_A and GAIE_GATEWAY_NAMESPACE.
# InferencePool name follows the operator convention: ${GAIE_DGD_MODEL_A}-pool
#
# Render: envsubst < http-route-model-a.yaml | kubectl apply -f -

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${GAIE_HTTP_ROUTE_MODEL_A}
  namespace: ${K8S_NAMESPACE}
spec:
  hostnames:
    - ${GAIE_HOST_MODEL_A}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ${GAIE_GATEWAY_NAME}
      namespace: ${GAIE_GATEWAY_NAMESPACE}
  rules:
    - backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: ${GAIE_DGD_MODEL_A}-pool
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 300s
