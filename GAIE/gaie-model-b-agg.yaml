#
# GAIE DynamoGraphDeployment for MODEL_B (aggregated decode worker).
# EPP plugin layout matches recipes/llama-3-70b/vllm/agg/gaie/deploy.yaml
# (decode-only profile, aggregated workers).
# The direct frontend is modeled via extraPodSpec.containers because the
# installed DGD v1alpha1 schema does not accept frontendSidecar.
#
# Render: envsubst < gaie-model-b-agg.yaml | kubectl apply -f -

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: ${GAIE_DGD_MODEL_B}
  namespace: ${K8S_NAMESPACE}
spec:
  backendFramework: vllm
  pvcs:
    - name: ${GAIE_CACHE_PVC_NAME}
      create: false
  services:
    Epp:
      envFromSecret: ${GAIE_HF_SECRET_NAME}
      componentType: epp
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: ${DYNAMO_EPP_IMAGE}
          env:
            - name: DYN_KV_CACHE_BLOCK_SIZE
              value: "${DYN_KV_CACHE_BLOCK_SIZE}"
            - name: DYN_MODEL_NAME
              value: "${MODEL_B}"
            - name: DYN_DECODE_FALLBACK
              value: "true"
      eppConfig:
        config:
          plugins:
            - type: disagg-profile-handler
            - name: decode-filter
              type: label-filter
              parameters:
                label: "nvidia.com/dynamo-sub-component-type"
                validValues:
                  - "decode"
                allowsNoLabel: true
            - name: picker
              type: max-score-picker
            - name: dyn-decode
              type: dyn-decode-scorer
          schedulingProfiles:
            - name: decode
              plugins:
                - pluginRef: decode-filter
                  weight: 1
                - pluginRef: dyn-decode
                  weight: 1
                - pluginRef: picker
                  weight: 1
    VllmDecodeWorker:
      componentType: worker
      envFromSecret: ${GAIE_HF_SECRET_NAME}
      volumeMounts:
        - name: ${GAIE_CACHE_PVC_NAME}
          mountPoint: /home/dynamo/.cache/huggingface/hub
      sharedMemory:
        size: 4Gi
      extraPodSpec:
        runtimeClassName: nvidia
        nodeSelector:
          ucloud.dk/gpu: "true"
        containers:
          - name: frontend-direct
            image: ${DYNAMO_VLLM_IMAGE}
            workingDir: /workspace
            command:
              - python3
              - -m
              - dynamo.frontend
            args:
              - --router-mode
              - direct
              - --discovery-backend
              - kubernetes
            env:
              - name: DYN_COMPONENT
                value: worker
              - name: DYN_DISCOVERY_BACKEND
                value: kubernetes
              - name: DYN_NAMESPACE
                value: ${K8S_NAMESPACE}-${GAIE_DGD_MODEL_B}
              - name: DYN_PARENT_DGD_K8S_NAME
                value: ${GAIE_DGD_MODEL_B}
              - name: DYN_PARENT_DGD_K8S_NAMESPACE
                value: ${K8S_NAMESPACE}
              - name: POD_NAME
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.name
              - name: POD_NAMESPACE
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.namespace
              - name: POD_UID
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.uid
            envFrom:
              - secretRef:
                  name: ${GAIE_HF_SECRET_NAME}
        mainContainer:
          image: ${DYNAMO_VLLM_IMAGE}
          workingDir: /workspace/examples/backends/vllm
          command:
            - /bin/sh
            - -c
          args:
            - "python3 -m dynamo.vllm --model ${MODEL_B} --served-model-name ${MODEL_B} --tensor-parallel-size 1 --data-parallel-size 1 --gpu-memory-utilization 0.90 --no-enable-prefix-caching --block-size ${DYN_KV_CACHE_BLOCK_SIZE}"
          env:
            - name: DYN_STORE_KV
              value: "mem"
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          custom:
            ephemeral-storage: "2Gi"
