#
# GAIE DynamoGraphDeployment for MODEL_B (aggregated decode worker), aligned
# with the release-aligned upstream aggregated example in v1.1.0:
# https://github.com/ai-dynamo/dynamo/blob/v1.1.0/examples/backends/vllm/deploy/gaie/agg.yaml
#
# Render: envsubst < gaie-model-b-agg.yaml | kubectl apply -f -

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: ${GAIE_DGD_MODEL_B}
  namespace: ${K8S_NAMESPACE}
spec:
  backendFramework: vllm
  pvcs:
    - name: ${GAIE_CACHE_PVC_NAME}
      create: false
  services:
    Epp:
      envFromSecret: ${GAIE_HF_SECRET_NAME}
      componentType: epp
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: ${DYNAMO_EPP_IMAGE}
          env:
            - name: DYN_KV_CACHE_BLOCK_SIZE
              value: "${DYN_KV_CACHE_BLOCK_SIZE}"
            - name: DYN_MODEL_NAME
              value: "${MODEL_B}"
            - name: DYN_DECODE_FALLBACK
              value: "true"
      eppConfig:
        config:
          plugins:
            - type: disagg-profile-handler
            - name: decode-filter
              type: label-filter
              parameters:
                label: "nvidia.com/dynamo-sub-component-type"
                validValues:
                  - "decode"
                allowsNoLabel: true
            - name: picker
              type: max-score-picker
            - name: dyn-decode
              type: dyn-decode-scorer
          schedulingProfiles:
            - name: decode
              plugins:
                - pluginRef: decode-filter
                  weight: 1
                - pluginRef: dyn-decode
                  weight: 1
                - pluginRef: picker
                  weight: 1
    VllmDecodeWorker:
      componentType: worker
      envFromSecret: ${GAIE_HF_SECRET_NAME}
      volumeMounts:
        - name: ${GAIE_CACHE_PVC_NAME}
          mountPoint: /home/dynamo/.cache/huggingface/hub
      sharedMemory:
        size: 4Gi
      extraPodSpec:
        runtimeClassName: nvidia
        nodeSelector:
          ucloud.dk/gpu: "true"
        mainContainer:
          image: ${DYNAMO_VLLM_IMAGE}
          workingDir: /workspace/examples/backends/vllm
          command:
            - /bin/sh
            - -c
          args:
            - "python3 -m dynamo.vllm --model ${MODEL_B} --served-model-name ${MODEL_B} --tensor-parallel-size 1 --data-parallel-size 1 --gpu-memory-utilization 0.90 --no-enable-prefix-caching --block-size ${DYN_KV_CACHE_BLOCK_SIZE}"
          env:
            - name: DYN_NAMESPACE
              value: "${K8S_NAMESPACE}-${GAIE_DGD_MODEL_B}"
            - name: DYN_NAMESPACE_WORKER_SUFFIX
              value: ""
            - name: DYN_STORE_KV
              value: "mem"
        containers:
          - name: frontend
            image: ${DYNAMO_VLLM_IMAGE}
            workingDir: /workspace
            command:
              - python3
            args:
              - -m
              - dynamo.frontend
              - --router-mode
              - direct
            ports:
              - containerPort: 8000
                name: http
                protocol: TCP
            envFrom:
              - secretRef:
                  name: ${GAIE_HF_SECRET_NAME}
            env:
              - name: DYNAMO_PORT
                value: "8000"
              - name: DYN_HTTP_PORT
                value: "8000"
              - name: DYN_NAMESPACE
                value: "${K8S_NAMESPACE}-${GAIE_DGD_MODEL_B}"
              - name: DYN_COMPONENT
                value: "frontend"
              - name: DYN_DISCOVERY_BACKEND
                value: "kubernetes"
              - name: DYN_PARENT_DGD_K8S_NAME
                value: "${GAIE_DGD_MODEL_B}"
              - name: DYN_PARENT_DGD_K8S_NAMESPACE
                value: "${K8S_NAMESPACE}"
              - name: POD_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              - name: POD_NAMESPACE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: POD_UID
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.uid
            livenessProbe:
              httpGet:
                path: /live
                port: http
              initialDelaySeconds: 15
              periodSeconds: 10
            readinessProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 10
              periodSeconds: 10
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          custom:
            ephemeral-storage: "2Gi"
